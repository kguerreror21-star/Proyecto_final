{% extends "base.html" %}
{% block title %}Eliminar tour | Adventurero{% endblock %}
{% block content %}
<section class="form-panel">
    <h1>Eliminar tour</h1>
    <p>Vas a eliminar {{ object }}. Esta accion no se puede deshacer.</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn-link" type="submit">Confirmar eliminacion</button>
        <a class="btn-link btn-muted" href="{{ object.get_absolute_url }}">Cancelar</a>
    </form>
</section>
{% endblock %}
